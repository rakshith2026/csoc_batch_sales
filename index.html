<title>CsoC Batch Explorer</title>
<style>
  :root {
    --bg: #f6f4ef;
    --surface: #ffffff;
    --surface-2: #efece4;
    --text: #23291f;
    --muted: #656f5f;
    --border: #ddd7c8;
    --accent: #2f6b4f;
    --accent-soft: #e3ede6;
    --warn: #a6631f;
    --warn-soft: #f4e6d3;
    --danger: #a13a3a;
    --danger-soft: #f5e0dd;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(35,41,31,0.06), 0 4px 14px rgba(35,41,31,0.05);
  }
  :root[data-theme="dark"] {
    --bg: #14180f;
    --surface: #1c2216;
    --surface-2: #232a1c;
    --text: #e9ede2;
    --muted: #9aa48c;
    --border: #2d3524;
    --accent: #7fc99d;
    --accent-soft: #223a2c;
    --warn: #e0ab63;
    --warn-soft: #3a2f1c;
    --danger: #e08b83;
    --danger-soft: #3a2320;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #14180f;
      --surface: #1c2216;
      --surface-2: #232a1c;
      --text: #e9ede2;
      --muted: #9aa48c;
      --border: #2d3524;
      --accent: #7fc99d;
      --accent-soft: #223a2c;
      --warn: #e0ab63;
      --warn-soft: #3a2f1c;
      --danger: #e08b83;
      --danger-soft: #3a2320;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.35);
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 28px 20px 60px; }

  .page { max-width: 1180px; margin: 0 auto; }

  header.top {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 22px;
  }
  header.top h1 {
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
    text-wrap: balance;
  }
  header.top .sub {
    color: var(--muted);
    font-size: 0.86rem;
    margin-top: 4px;
  }
  header.top .asof {
    color: var(--muted);
    font-size: 0.78rem;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .stat .n {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat .l {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 3px;
  }
  .stat.accent .n { color: var(--accent); }
  .stat.warn .n { color: var(--warn); }

  .views {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .view-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 7px 13px;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .view-btn:hover { border-color: var(--accent); }
  .view-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .view-btn .count {
    font-variant-numeric: tabular-nums;
    opacity: 0.75;
    margin-left: 4px;
  }

  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 18px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .filters label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .filters select, .filters input[type="search"] {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 0.86rem;
    min-width: 140px;
  }
  .filters select:focus, .filters input:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .filters .field { display: flex; flex-direction: column; }
  .filters .search-field { flex: 1; min-width: 180px; }
  .filters .search-field input { width: 100%; }
  .filters .reset {
    align-self: flex-end;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .filters .reset:hover { color: var(--text); border-color: var(--text); }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.86rem; min-width: 760px; }
  thead th {
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    position: sticky;
    top: 0;
    white-space: nowrap;
  }
  tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface-2); }
  td.batch-code { font-weight: 600; font-variant-numeric: tabular-nums; }
  td.display-name { white-space: normal; color: var(--muted); font-size: 0.82rem; max-width: 220px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.date { font-variant-numeric: tabular-nums; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .chip.country { background: var(--accent-soft); color: var(--accent); }
  .chip::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
  .chip.status-open { background: var(--warn-soft); color: var(--warn); }
  .chip.status-open::before { background: var(--warn); }
  .chip.status-closed { background: var(--surface-2); color: var(--muted); }
  .chip.status-closed::before { background: var(--muted); }

  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }

  footer.note {
    margin-top: 16px;
    color: var(--muted);
    font-size: 0.76rem;
  }

  a.sort-th { color: inherit; text-decoration: none; cursor: pointer; user-select: none; }
  a.sort-th:hover { color: var(--text); }
  a.sort-th .arrow { opacity: 0.5; font-size: 0.65rem; }
</style>
<div class="page">
  <header class="top">
    <div>
      <h1>CsoC Batch Explorer</h1>
      <div class="sub">Live batch schedule — filter by level and country, or jump to what's starting or under-filled.</div>
    </div>
    <div class="asof" id="asof"></div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="views" id="views"></div>

  <div class="filters">
    <div class="field">
      <label for="f-level">Level</label>
      <select id="f-level"><option value="">All levels</option></select>
    </div>
    <div class="field">
      <label for="f-country">Country</label>
      <select id="f-country"><option value="">All countries</option></select>
    </div>
    <div class="field">
      <label for="f-status">Status</label>
      <select id="f-status">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div class="field search-field">
      <label for="f-search">Search coach / batch</label>
      <input type="search" id="f-search" placeholder="e.g. Hardik, IND-F3-133" />
    </div>
    <button class="reset" id="reset-btn">Reset filters</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><a class="sort-th" data-key="batch_code">Batch code <span class="arrow"></span></a></th>
          <th>Schedule</th>
          <th><a class="sort-th" data-key="level">Level <span class="arrow"></span></a></th>
          <th><a class="sort-th" data-key="country">Country <span class="arrow"></span></a></th>
          <th><a class="sort-th" data-key="coach_name">Coach <span class="arrow"></span></a></th>
          <th><a class="sort-th" data-key="start_date">Start <span class="arrow"></span></a></th>
          <th><a class="sort-th" data-key="end_date">End <span class="arrow"></span></a></th>
          <th>Status</th>
          <th><a class="sort-th" data-key="entrycount">Entries <span class="arrow"></span></a></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">No batches match these filters.</div>
  </div>

  <footer class="note" id="footnote"></footer>
</div>

id": 39572, "batch_name": "IND-ADV4-101", "batch_display_name": "Tues-Fri 5:00PM (above 2001)", "start_date": "2027-12-29", "end_date": "2030-01-23", "registration_active": 0, "coach_name": "Shardul", "entrycount": 1}];

const COUNTRY_NAMES = {
  IND: "India", US: "United States", UK: "United Kingdom", AUS: "Australia",
  CAN: "Canada", SGP: "Singapore", UAE: "United Arab Emirates"
};

function parseBatch(row) {
  let code = row.batch_name || "";
  let display = row.batch_display_name || "";
  // Some rows have batch_name/display_name swapped (display looks like a code, code looks like a schedule string).
  const looksLikeCode = s => /^[A-Za-z]{2,4}(-[A-Za-z0-9]+){1,3}$/.test((s || "").trim());
  if (!looksLikeCode(code) && looksLikeCode(display)) {
    [code, display] = [display, code];
  }
  const parts = code.split("-").filter(Boolean);
  const country = (parts[0] || "?").toUpperCase();
  const level = parts.length >= 2 ? parts[parts.length - 2].toUpperCase() : "?";
  return { ...row, batch_code: code, display_name: display, country, level };
}

const DATA = RAW.map(parseBatch);

function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7; // Monday = 0
  x.setDate(x.getDate() - day);
  x.setHours(0, 0, 0, 0);
  return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function toISO(d) { return d.toISOString().slice(0, 10); }

const today = new Date();
const thisWeekStart = startOfWeek(today);
const thisWeekEnd = addDays(thisWeekStart, 6);
const lastWeekStart = addDays(thisWeekStart, -7);
const lastWeekEnd = addDays(thisWeekStart, -1);

function inRange(dateStr, start, end) {
  const d = new Date(dateStr + "T00:00:00");
  return d >= start && d <= end;
}

document.getElementById("asof").textContent =
  "Data as of today · " + today.toDateString();

document.getElementById("footnote").textContent =
  `Week window: ${toISO(thisWeekStart)} → ${toISO(thisWeekEnd)}. "Unfilled" = registration still open for a batch that already started last week.`;

const VIEWS = [
  { key: "all", label: "All batches", test: () => true },
  { key: "starting", label: "Starting this week", test: r => inRange(r.start_date, thisWeekStart, thisWeekEnd) },
  { key: "unfilled", label: "Unfilled — last week", test: r => inRange(r.start_date, lastWeekStart, lastWeekEnd) && r.registration_active === 1 },
];

let state = { view: "all", level: "", country: "", status: "open", search: "", sortKey: "start_date", sortDir: "desc" };

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });
}

const levels = [...new Set(DATA.map(r => r.level))].sort();
const countries = [...new Set(DATA.map(r => r.country))].sort();
populateSelect("f-level", levels);
populateSelect("f-country", countries.map(c => c));

// show country name in dropdown label
Array.from(document.getElementById("f-country").options).forEach(opt => {
  if (opt.value && COUNTRY_NAMES[opt.value]) {
    opt.textContent = `${opt.value} — ${COUNTRY_NAMES[opt.value]}`;
  }
});

document.getElementById("f-status").value = state.status;

function renderViews() {
  const container = document.getElementById("views");
  container.innerHTML = "";
  VIEWS.forEach(v => {
    const count = DATA.filter(v.test).length;
    const btn = document.createElement("button");
    btn.className = "view-btn" + (state.view === v.key ? " active" : "");
    btn.innerHTML = `${v.label} <span class="count">${count}</span>`;
    btn.onclick = () => { state.view = v.key; render(); };
    container.appendChild(btn);
  });
}

function currentRows() {
  const viewDef = VIEWS.find(v => v.key === state.view);
  let rows = DATA.filter(viewDef.test);
  if (state.level) rows = rows.filter(r => r.level === state.level);
  if (state.country) rows = rows.filter(r => r.country === state.country);
  if (state.status === "open") rows = rows.filter(r => r.registration_active === 1);
  if (state.status === "closed") rows = rows.filter(r => r.registration_active !== 1);
  if (state.search) {
    const q = state.search.toLowerCase();
    rows = rows.filter(r =>
      (r.coach_name || "").toLowerCase().includes(q) ||
      (r.batch_code || "").toLowerCase().includes(q) ||
      (r.display_name || "").toLowerCase().includes(q)
    );
  }
  rows = rows.slice().sort((a, b) => {
    let av = a[state.sortKey], bv = b[state.sortKey];
    if (state.sortKey === "entrycount") { av = av || 0; bv = bv || 0; }
    else { av = (av || "").toString(); bv = (bv || "").toString(); }
    if (av < bv) return state.sortDir === "asc" ? -1 : 1;
    if (av > bv) return state.sortDir === "asc" ? 1 : -1;
    return 0;
  });
  return rows;
}

function renderStats() {
  const total = DATA.length;
  const startingCount = DATA.filter(VIEWS[1].test).length;
  const unfilledCount = DATA.filter(VIEWS[2].test).length;
  const openReg = DATA.filter(r => r.registration_active === 1).length;
  const stats = [
    { label: "Total batches", n: total, cls: "" },
    { label: "Starting this week", n: startingCount, cls: "accent" },
    { label: "Unfilled from last week", n: unfilledCount, cls: "warn" },
    { label: "Registration open (all)", n: openReg, cls: "" },
  ];
  const container = document.getElementById("stats");
  container.innerHTML = "";
  stats.forEach(s => {
    const div = document.createElement("div");
    div.className = "stat " + s.cls;
    div.innerHTML = `<div class="n">${s.n}</div><div class="l">${s.label}</div>`;
    container.appendChild(div);
  });
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, { day: "2-digit", month: "short", year: "numeric" });
}

function renderTable() {
  const rows = currentRows();
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");
  tbody.innerHTML = "";
  if (!rows.length) {
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  rows.forEach(r => {
    const tr = document.createElement("tr");
    const statusOpen = r.registration_active === 1;
    tr.innerHTML = `
      <td class="batch-code">${r.batch_code}</td>
      <td class="display-name">${r.display_name || "—"}</td>
      <td><span class="chip country">${r.level}</span></td>
      <td><span class="chip country">${r.country}</span></td>
      <td>${r.coach_name || "—"}</td>
      <td class="date">${fmtDate(r.start_date)}</td>
      <td class="date">${fmtDate(r.end_date)}</td>
      <td><span class="chip ${statusOpen ? "status-open" : "status-closed"}">${statusOpen ? "Open" : "Closed"}</span></td>
      <td class="num">${r.entrycount ?? 0}</td>
    `;
    tbody.appendChild(tr);
  });
}

function updateSortArrows() {
  document.querySelectorAll(".sort-th").forEach(a => {
    const arrow = a.querySelector(".arrow");
    if (a.dataset.key === state.sortKey) {
      arrow.textContent = state.sortDir === "asc" ? "▲" : "▼";
    } else {
      arrow.textContent = "";
    }
  });
}

function render() {
  renderViews();
  renderStats();
  renderTable();
  updateSortArrows();
}

document.querySelectorAll(".sort-th").forEach(a => {
  a.addEventListener("click", () => {
    const key = a.dataset.key;
    if (state.sortKey === key) {
      state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
    } else {
      state.sortKey = key;
      state.sortDir = "asc";
    }
    render();
  });
});

document.getElementById("f-level").addEventListener("change", e => { state.level = e.target.value; render(); });
document.getElementById("f-country").addEventListener("change", e => { state.country = e.target.value; render(); });
document.getElementById("f-status").addEventListener("change", e => { state.status = e.target.value; render(); });
document.getElementById("f-search").addEventListener("input", e => { state.search = e.target.value; render(); });
document.getElementById("reset-btn").addEventListener("click", () => {
  state = { view: "all", level: "", country: "", status: "open", search: "", sortKey: "start_date", sortDir: "desc" };
  document.getElementById("f-level").value = "";
  document.getElementById("f-country").value = "";
  document.getElementById("f-status").value = "open";
  document.getElementById("f-search").value = "";
  render();
});

render();
</script>
